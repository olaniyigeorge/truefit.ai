name: Deploy TrueFit to GCP

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy to GCP Compute Engine
    runs-on: ubuntu-latest
    environment: prod

    steps:
      # ── 1. Checkout code ────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Set up SSH key ────────────────────────────────────────────────────
      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.GCP_SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          # Skip strict host checking — avoids ssh-keyscan failures
          cat >> ~/.ssh/config <<EOF
          Host ${{ secrets.GCP_VM_IP }}
            StrictHostKeyChecking no
            UserKnownHostsFile /dev/null
          EOF

        # - temporary debug
      - name: Debug SSH key format
        run: |
          echo "Key line count:"
          wc -l ~/.ssh/id_ed25519
          echo "First line:"
          head -1 ~/.ssh/id_ed25519
          echo "Last line:"
          tail -1 ~/.ssh/id_ed25519

      # ── 3. Copy deploy.sh to VM ──────────────────────────────────────────────
      - name: Copy deploy script to VM
        run: |
          scp -i ~/.ssh/id_ed25519 \
              -o StrictHostKeyChecking=no \
              -o UserKnownHostsFile=/dev/null \
              scripts/deploy.sh \
              ${{ secrets.GCP_VM_USER }}@${{ secrets.GCP_VM_IP }}:~/deploy.sh

      # ── 4. SSH in and run deploy.sh ──────────────────────────────────────────
      - name: Run deployment on VM
        run: |
          ssh -i ~/.ssh/id_ed25519 \
              -o StrictHostKeyChecking=no \
              -o UserKnownHostsFile=/dev/null \
              ${{ secrets.GCP_VM_USER }}@${{ secrets.GCP_VM_IP }} \
              "chmod +x ~/deploy.sh && bash ~/deploy.sh"